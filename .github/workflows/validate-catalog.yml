name: Validate catalog

# Validates plugins.json (the trust root the Phlix server reads) on every push
# and pull request:
#   1. JSON-Schema conformance against plugins.schema.json (pinned validator).
#   2. plugins.json is valid JSON AND entries are sorted by `name` with no
#      duplicate `name` (the "unsorted/undeduped" code-quality gate).
#   3. (non-blocking) per-entry pin-drift check: download each pinned tarball
#      and assert its sha256 matches artifactSha256, surfacing drift without
#      flaking PRs.
#   4. (BLOCKING) per-entry plugin-manifest check: download each pinned tarball,
#      extract its `plugin.json`, and validate it against the phlix-shared
#      manifest schema — the SAME contract the Phlix server enforces at install
#      time. This is the guardrail that stops a catalog release from pinning a
#      plugin the server would reject on install: an invalid `type` (must be a
#      value from the manifest schema's enum — e.g. `metadata-provider`, NOT
#      `metadata`), a `settings.<name>` field carrying a key the strict settings
#      schema forbids (e.g. an inert `managed` flag), a malformed `events[]`
#      entry, etc. If any pinned manifest is invalid, CI fails.
#
# Landmines honored:
#   - The schema uses `format: uri`, so ajv needs ajv-formats (co-installed and
#     passed via `-c ajv-formats`), otherwise the `uri` format keyword errors.
#   - The schema is Draft 2020-12, so ajv needs `--spec=draft2020`.
#   - NO setup-node `cache: npm` — this repo has no lockfile.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  schema:
    name: JSON-Schema + sort/dedup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # No `cache: npm` — there is no lockfile in this repo (known landmine).

      - name: Validate plugins.json against plugins.schema.json
        run: |
          # ajv-cli@5 (ajv v8) for Draft 2020-12; ajv-formats@2 supplies the
          # `uri` format keyword the schema relies on. Both pinned.
          npx --yes --package ajv-cli@5 --package ajv-formats@2 -- \
            ajv validate \
              --spec=draft2020 \
              -s plugins.schema.json \
              -d plugins.json \
              -c ajv-formats

      - name: Assert plugins.json is valid JSON, sorted by name, no duplicates
        run: |
          # `jq -e` already fails (exit 5) on a JSON parse error, so this step
          # doubles as the "valid JSON" assertion. The filter then fails (via
          # halt_error 1) if the names are out of order or contain a duplicate.
          jq -e -r '
            .plugins | map(.name) as $names
            | ($names | sort)   as $sorted
            | ($names | unique) as $uniq
            | if ($names != $sorted) then
                "ERROR: plugins are not sorted by name.\n  got:  \($names)\n  want: \($sorted)"
                | halt_error(1)
              elif ($uniq | length) != ($names | length) then
                "ERROR: duplicate plugin name(s): "
                + ([$names[] | select(. as $n | ([$names[] | select(. == $n)] | length) > 1)] | unique | tostring)
                | halt_error(1)
              else
                "OK: \($names | length) entries — valid JSON, sorted by name, no duplicates."
              end
          ' plugins.json

  pin-drift:
    name: Pin-drift (non-blocking)
    runs-on: ubuntu-latest
    # Surfaces ref/artifactSha256 drift without ever failing a PR.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify each entry's artifactSha256 matches its pinned tarball
        run: |
          set -u
          drift=0
          # owner/repo are derived from the entry `repo` URL; ref + expected
          # digest come straight from the catalog.
          while IFS=$'\t' read -r name repo ref expected; do
            owner_repo="${repo#https://github.com/}"
            owner_repo="${owner_repo%/}"
            url="https://github.com/${owner_repo}/archive/${ref}.tar.gz"
            echo "::group::${name}"
            echo "url: ${url}"
            actual="$(curl -fsSL "${url}" | sha256sum | cut -d' ' -f1)" || {
              echo "WARN: could not download ${url}"
              echo "::endgroup::"
              drift=1
              continue
            }
            if [ "${actual}" = "${expected}" ]; then
              echo "OK: ${actual}"
            else
              echo "DRIFT: expected ${expected} but tarball hashes to ${actual}"
              drift=1
            fi
            echo "::endgroup::"
          done < <(jq -r '.plugins[] | [.name, .repo, .ref, .artifactSha256] | @tsv' plugins.json)

          if [ "${drift}" -ne 0 ]; then
            echo "Pin drift detected (non-blocking). Review the entries above."
            exit 1
          fi
          echo "All pins match their tarballs."

  manifest:
    name: Plugin manifest schema (blocking)
    runs-on: ubuntu-latest
    # BLOCKING: every pinned plugin's plugin.json must satisfy the phlix-shared
    # manifest schema — the same contract the server validates at install time
    # (PluginLoader::finalizeInstall). Prevents pinning a plugin that would fail
    # to install (bad `type`, forbidden `settings.*` key like `managed`, etc.).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # No `cache: npm` — there is no lockfile in this repo (known landmine).

      - name: Fetch the phlix-shared manifest schema
        run: |
          # Canonical manifest contract, kept in phlix-shared. Draft 2020-12.
          curl -fsSL --retry 3 \
            https://raw.githubusercontent.com/detain/phlix-shared/master/schemas/manifest.schema.json \
            -o manifest.schema.json
          echo "manifest schema: $(jq -r '."$schema"' manifest.schema.json)"

      - name: Validate every pinned plugin's plugin.json against the manifest schema
        run: |
          set -u
          fail=0
          while IFS=$'\t' read -r name repo ref; do
            owner_repo="${repo#https://github.com/}"; owner_repo="${owner_repo%/}"
            url="https://github.com/${owner_repo}/archive/${ref}.tar.gz"
            echo "::group::${name} (${ref})"
            work="$(mktemp -d)"
            if ! curl -fsSL "${url}" | tar -xz -C "${work}" --strip-components=1; then
              echo "ERROR: could not download/extract ${url}"
              fail=1; rm -rf "${work}"; echo "::endgroup::"; continue
            fi
            if [ ! -f "${work}/plugin.json" ]; then
              echo "ERROR: ${name} has no plugin.json at the repo root"
              fail=1; rm -rf "${work}"; echo "::endgroup::"; continue
            fi
            # ajv-cli@5 (ajv v8, Draft 2020-12) + ajv-formats@2, both pinned.
            if npx --yes --package ajv-cli@5 --package ajv-formats@2 -- \
                 ajv validate --spec=draft2020 --all-errors \
                   -s manifest.schema.json -d "${work}/plugin.json" -c ajv-formats; then
              echo "OK: ${name} manifest is valid"
            else
              echo "INVALID: ${name} manifest fails the manifest schema (see ajv errors above)"
              fail=1
            fi
            rm -rf "${work}"
            echo "::endgroup::"
          done < <(jq -r '.plugins[] | [.name, .repo, .ref] | @tsv' plugins.json)

          if [ "${fail}" -ne 0 ]; then
            echo "One or more pinned plugin manifests are invalid — the server would reject them at install. Refusing to pin."
            exit 1
          fi
          echo "All pinned plugin manifests satisfy the manifest schema."
